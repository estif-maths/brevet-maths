<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machine à Fonctions Pédagogique - Version Finale</title>
    <style>
        :root {
            --green-machine: #76a351;
            --blue-border: #4dd0e1;
            --accent-red: #d32f2f;
            --accent-blue: #1976d2;
            --bg-dark: #1a1a1a;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #f8f9fa;
            overflow-x: hidden;
        }

        /* Responsive Scaling */
        @media (max-width: 650px) {
            .container {
                transform: scale(0.65); 
                transform-origin: center center;
                margin: -50px 0;
            }
        }

        @media (max-width: 400px) {
            .container {
                transform: scale(0.5);
            }
        }

        .container {
            display: flex;
            align-items: center;
            gap: 40px;
            position: relative;
            height: 350px;
            transition: transform 0.3s ease;
        }

        .box-wrapper { text-align: center; width: 150px; }
        .label { font-weight: bold; font-size: 1.2rem; margin-bottom: 5px; }
        .math-symbol { font-style: italic; font-size: 1.4rem; color: #555; }

        .cube {
            width: 130px; height: 130px;
            border: 3px solid var(--blue-border);
            background: rgba(255, 255, 255, 0.7);
            border-radius: 8px;
        }

        .machine {
            width: 280px; height: 280px;
            background-color: var(--green-machine);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.2);
            z-index: 5;
            color: white;
            transition: transform 0.3s;
        }

        .screen {
            width: 90%; 
            min-height: 90px;
            background: var(--bg-dark); 
            color: #00ff41;
            font-family: 'Courier New', monospace; 
            padding: 10px;
            text-align: center; 
            border-radius: 6px;
            margin: 10px 0; 
            border: 3px solid #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 5px;
            box-sizing: border-box;
        }

        .formula-line { font-size: 1.1rem; border-bottom: 1px solid #333; padding-bottom: 4px; }
        .calc-line { font-size: 1.2rem; font-weight: bold; color: #fff; line-height: 1.4; }

        .gear {
            width: 50px; height: 50px;
            border: 6px dashed #fff; border-radius: 50%;
            animation: spin 2s linear infinite;
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .token {
            position: absolute; 
            font-size: 2.5rem; 
            font-weight: bold;
            z-index: 10;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            left: 90px;
            color: var(--accent-red);
            pointer-events: none;
        }

        .pos-start { opacity: 1; left: 90px; transform: scale(1); }
        .pos-hidden { opacity: 0; left: 330px; transform: scale(0.2); }
        .pos-end { opacity: 1; left: 560px; transform: scale(1.1); color: var(--accent-blue) !important; }

        .btn-container { margin-top: 20px; }
        button {
            padding: 15px 40px;
            background: var(--green-machine); color: white;
            border: none; border-radius: 50px; cursor: pointer;
            font-size: 1.2rem; font-weight: bold;
            box-shadow: 0 5px 0 #5a7d3e;
            transition: all 0.2s;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #5a7d3e; }
        button:hover { background: #86b45e; }
    </style>
</head>
<body>

    <div class="container" id="stage">
        <div class="box-wrapper">
            <div class="label">Antécédent</div>
            <div class="math-symbol">x</div>
            <div class="cube"></div>
        </div>

        <div class="machine" id="machine-body">
            <div style="font-weight: bold; font-size: 1.2rem;">Machine à Fonctions</div>
            <div class="screen">
                <div id="screen-formula" class="formula-line">Prêt...</div>
                <div id="screen-calc" class="calc-line"></div>
            </div>
            <div class="gear" id="main-gear"></div>
        </div>

        <div class="box-wrapper">
            <div class="label">Image</div>
            <div class="math-symbol">f(x)</div>
            <div class="cube"></div>
        </div>
    </div>

    <div class="btn-container">
        <button onclick="startProcess()">Nouveau Calcul</button>
    </div>

    <script>
        function startProcess() {
            const stage = document.getElementById('stage');
            const formulaDisplay = document.getElementById('screen-formula');
            const calcDisplay = document.getElementById('screen-calc');
            const gear = document.getElementById('main-gear');
            const machine = document.getElementById('machine-body');

            // Remove existing tokens
            document.querySelectorAll('.token').forEach(t => t.remove());

            // Random x between -10 and 10
            const x = Math.floor(Math.random() * 21) - 10;
            
            // Format x for display: use brackets if negative
            const xDisp = x < 0 ? `(${x})` : x;
            
            const choice = Math.floor(Math.random() * 3);
            let result, formulaText, calculationStep;

            if (choice === 0) {
                const c = Math.floor(Math.random() * 9) + 1;
                formulaText = `f(x) = x² + ${c}`;
                calculationStep = `${xDisp}² + ${c}`;
                result = (x * x) + c;
            } else if (choice === 1) {
                formulaText = `f(x) = x³ + x - 2`;
                calculationStep = `${xDisp}³ + ${xDisp} - 2`;
                result = (Math.pow(x, 3)) + x - 2;
            } else {
                const m = Math.floor(Math.random() * 3) + 2;
                formulaText = `f(x) = ${m}x - 5`;
                calculationStep = `${m} × ${xDisp} - 5`;
                result = (m * x) - 5;
            }

            // Create token
            const token = document.createElement('div');
            token.className = 'token';
            token.innerText = x;
            stage.appendChild(token);

            formulaDisplay.innerText = formulaText;
            calcDisplay.innerText = "";
            gear.style.animationPlayState = "running";

            // Animation Sequence
            requestAnimationFrame(() => {
                setTimeout(() => {
                    // Phase 1: Appear at Start
                    token.classList.add('pos-start');

                    // Phase 2: Enter Machine
                    setTimeout(() => {
                        token.classList.replace('pos-start', 'pos-hidden');
                        
                        // Phase 3: Display calculation inside
                        setTimeout(() => {
                            machine.style.transform = "scale(1.05)";
                            calcDisplay.innerText = calculationStep + " = ...";
                            
                            setTimeout(() => {
                                calcDisplay.innerText = calculationStep + " = " + result;
                                gear.style.animationDuration = "0.5s";
                            }, 1000);
                        }, 800);

                    }, 1000);

                    // Phase 4: Output
                    setTimeout(() => {
                        machine.style.transform = "scale(1)";
                        gear.style.animationDuration = "2s";
                        token.innerText = result;
                        token.classList.replace('pos-hidden', 'pos-end');
                    }, 3500);
                }, 50);
            });
        }
    </script>
</body>
</html>
